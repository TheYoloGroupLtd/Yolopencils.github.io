<!DOCTYPE html>
<html>
<head>
<title>YOLO Lite</title>
<style>
body{font-family:Poppins;background:#f5f3ff;text-align:center;margin-top:100px;}
button{background:#7c3aed;color:white;border:none;padding:10px 20px;border-radius:10px;}
</style>
</head>

<body>

<h1>YOLO Lite ⚡ (₹30)</h1>

<input type="color" id="color" value="#00ff00"><br><br>
<button onclick="addToCart()">Add to Cart</button>

<script>
function addToCart(){
let cart = JSON.parse(localStorage.getItem("cart")) || [];
cart.push({name:"YOLO Lite",price:30,color:document.getElementById("color").value});
localStorage.setItem("cart",JSON.stringify(cart));
alert("Added!");
}
</script>

</body>
</html>
