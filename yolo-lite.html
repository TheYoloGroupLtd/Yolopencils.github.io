<!DOCTYPE html>
<html lang="en">
<head>

<title>YOLO Lite</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{font-family:'Poppins';margin:0;background:linear-gradient(135deg,#ede9fe,#f5f3ff);}
nav{display:flex;justify-content:space-between;padding:20px 8%;background:white;}
.container{display:flex;flex-wrap:wrap;gap:50px;padding:80px 8%;align-items:center;}
.preview{width:320px;height:70px;border-radius:40px;background:#6d28d9;}
button{background:#7c3aed;color:white;border:none;padding:12px;border-radius:12px;width:100%;margin-top:20px;}
</style>

</head>

<body>

<nav>
<h2>YOLO ✏️</h2>
<a href="index.html">Back</a>
</nav>

<div class="container">

<div class="preview" id="preview"></div>

<div>

<h1>YOLO Lite ⚡</h1>
<p>₹25</p>

<label>Choose Color</label>
<input type="color" id="color" value="#6d28d9" onchange="updatePreview()">

<button onclick="addToCart()">Add to Cart</button>

</div>

</div>

<script>
function updatePreview(){
document.getElementById("preview").style.background =
document.getElementById("color").value;
}

function addToCart(){
let color=document.getElementById("color").value;
let cart=JSON.parse(localStorage.getItem("cart"))||[];

cart.push({name:`YOLO Lite (${color})`,price:99});

localStorage.setItem("cart",JSON.stringify(cart));
alert("Added to cart!");
}
</script>

</body>
</html>
