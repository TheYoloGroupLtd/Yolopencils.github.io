<script>
const scene = new THREE.Scene();

/* CAMERA */
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / 500, 0.1, 1000);
camera.position.set(0, 0, 8);

/* RENDERER */
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, 500);
renderer.setPixelRatio(window.devicePixelRatio);
document.getElementById("pencil3d").appendChild(renderer.domElement);

/* ===== MATERIALS (REALISTIC) ===== */
const bodyMat = new THREE.MeshStandardMaterial({
  color: 0xffd27f,
  roughness: 0.6,
  metalness: 0.1
});

const woodMat = new THREE.MeshStandardMaterial({
  color: 0xc68642,
  roughness: 0.9
});

const graphiteMat = new THREE.MeshStandardMaterial({
  color: 0x222222,
  roughness: 0.3
});

const metalMat = new THREE.MeshStandardMaterial({
  color: 0xd4d4d4,
  metalness: 1,
  roughness: 0.2
});

const eraserMat = new THREE.MeshStandardMaterial({
  color: 0xff6b6b,
  roughness: 0.7
});

/* ===== PENCIL GROUP ===== */
const pencil = new THREE.Group();

/* BODY */
const body = new THREE.Mesh(
  new THREE.CylinderGeometry(0.15, 0.15, 4.5, 64),
  bodyMat
);
pencil.add(body);

/* WOOD TIP BASE */
const wood = new THREE.Mesh(
  new THREE.ConeGeometry(0.15, 0.7, 64),
  woodMat
);
wood.position.y = -2.6;
pencil.add(wood);

/* GRAPHITE TIP */
const tip = new THREE.Mesh(
  new THREE.ConeGeometry(0.07, 0.3, 64),
  graphiteMat
);
tip.position.y = -3;
pencil.add(tip);

/* METAL FERRULE */
const ferrule = new THREE.Mesh(
  new THREE.CylinderGeometry(0.16, 0.16, 0.5, 64),
  metalMat
);
ferrule.position.y = 2.4;
pencil.add(ferrule);

/* ERASER */
const eraser = new THREE.Mesh(
  new THREE.CylinderGeometry(0.14, 0.14, 0.6, 64),
  eraserMat
);
eraser.position.y = 2.9;
pencil.add(eraser);

scene.add(pencil);

/* ===== LIGHTING (APPLE STYLE) ===== */
const keyLight = new THREE.DirectionalLight(0xffffff, 1.2);
keyLight.position.set(5, 5, 5);
scene.add(keyLight);

const fillLight = new THREE.DirectionalLight(0xffffff, 0.5);
fillLight.position.set(-5, 3, 2);
scene.add(fillLight);

scene.add(new THREE.AmbientLight(0xffffff, 0.4));

/* ===== SHADOW FLOOR ===== */
const plane = new THREE.Mesh(
  new THREE.PlaneGeometry(10, 10),
  new THREE.ShadowMaterial({ opacity: 0.2 })
);
plane.rotation.x = -Math.PI / 2;
plane.position.y = -3.2;
scene.add(plane);

/* ===== SMOOTH INTERACTION ===== */
let targetX = 0;
let targetY = 0;

window.addEventListener("mousemove", (e) => {
  targetX = (e.clientX / window.innerWidth - 0.5) * 2;
  targetY = (e.clientY / window.innerHeight - 0.5) * 2;
});

/* ===== SCROLL CONTROL (FERRARI STYLE) ===== */
let scrollProgress = 0;

window.addEventListener("scroll", () => {
  const section = document.getElementById("pencil3d");
  const rect = section.getBoundingClientRect();
  const windowHeight = window.innerHeight;

  if (rect.top < windowHeight && rect.bottom > 0) {
    scrollProgress = (windowHeight - rect.top) / windowHeight;
  }
});

/* ===== ANIMATION LOOP ===== */
function animate() {
  requestAnimationFrame(animate);

  /* SMOOTH FOLLOW */
  pencil.rotation.x += (targetY * 0.5 - pencil.rotation.x) * 0.05;
  pencil.rotation.z += (targetX * 0.5 - pencil.rotation.z) * 0.05;

  /* SCROLL ROTATION (MAIN EFFECT) */
  pencil.rotation.y = scrollProgress * Math.PI * 2;

  /* FLOAT */
  pencil.position.y = Math.sin(Date.now() * 0.002) * 0.2;

  renderer.render(scene, camera);
}

animate();

/* RESPONSIVE */
window.addEventListener("resize", () => {
  renderer.setSize(window.innerWidth, 500);
  camera.aspect = window.innerWidth / 500;
  camera.updateProjectionMatrix();
});
</script>
