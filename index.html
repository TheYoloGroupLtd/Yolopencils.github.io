<!DOCTYPE html>
<html lang="en">
<head>

<title>YOLO Pencils</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src='https://www.noupe.com/embed/019beb1020a87e669009e2d22f80692045cb.js'></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system;}
body{
background:linear-gradient(135deg,#ffffff,#f5f3ff,#ede9fe);
color:#1f2937;
overflow-x:hidden;
}

/* NAV */
nav{
position:fixed;top:20px;left:50%;
transform:translateX(-50%);
width:92%;padding:14px;
background:rgba(255,255,255,0.6);
backdrop-filter:blur(20px);
border-radius:30px;
display:flex;justify-content:space-between;
z-index:1000;
}

/* HERO */
.hero{
min-height:100vh;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 8%;
}

.hero h1{
font-size:72px;
background:linear-gradient(135deg,#6d28d9,#a78bfa);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* LOGO */
.logo{
width:280px;height:280px;border-radius:50%;
background:linear-gradient(135deg,#ddd6fe,#c4b5fd);
display:flex;align-items:center;justify-content:center;
box-shadow:0 30px 100px rgba(109,40,217,0.3);
transition:0.2s;
}

/* PRODUCTS */
.products,.why,.contact{
opacity:0;
transform:translateY(50px);
transition:1s;
}

/* ACTIVE SCROLL */
.show{
opacity:1;
transform:translateY(0);
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:30px;
margin-top:40px;
}

.card{
background:rgba(255,255,255,0.7);
padding:30px;border-radius:25px;
transition:0.3s;
}

.card:hover{
transform:translateY(-10px) scale(1.05);
}

/* CONTACT */
.contact{
padding:80px;
background:linear-gradient(135deg,#fff,#ede9fe,#ddd6fe);
border-radius:40px;
margin:40px;
text-align:center;
}

/* MOBILE */
@media(max-width:768px){
.hero{flex-direction:column;text-align:center;padding-top:120px;}
.hero h1{font-size:42px;}
.logo{width:200px;height:200px;}
}
</style>

</head>

<body>

<nav>
<div><strong>YOLO</strong></div>
<div>
<a href="#products">Products</a>
<a href="#contact">Contact</a>
</div>
</nav>

<!-- HERO -->
<section class="hero">
<div>
<h1>YOLO Pencils</h1>
<p>Write better. Think sharper.</p>
</div>

<div class="logo" id="logo">
<img src="yolo-logo.png" width="70%">
</div>
</section>

<!-- PRODUCTS -->
<section class="products" id="products">
<h2>Our Products</h2>

<div class="grid">
<div class="card"><h3>YOLO Maxx</h3><a href="yolo-maxx.html">View</a></div>
<div class="card"><h3>YOLO Lite</h3><a href="yolo-lite.html">View</a></div>
<div class="card"><h3>Custom Pencils</h3><a href="custom-pencils.html">View</a></div>
</div>
</section>

<!-- WHY -->
<section class="why">
<h2>Why YOLO?</h2>

<div class="grid">
<div class="card">Ultra Smooth</div>
<div class="card">Premium Build</div>
<div class="card">Built for Creators</div>
</div>
</section>

<!-- CONTACT -->
<section class="contact" id="contact">

<h2>Contact Us</h2>

<form action="https://formspree.io/f/xnjokvbg" method="POST">
<input type="text" name="name" placeholder="Name" required>
<input type="email" name="email" placeholder="Email" required>
<textarea name="message" placeholder="Message"></textarea>
<button>Send</button>
</form>

</section>

<script>

/* SCROLL REVEAL */
const sections=document.querySelectorAll(".products,.why,.contact");

window.addEventListener("scroll",()=>{
sections.forEach(sec=>{
const top=sec.getBoundingClientRect().top;
if(top<window.innerHeight-100){
sec.classList.add("show");
}
});
});

/* 3D LOGO */
const logo=document.getElementById("logo");

document.addEventListener("mousemove",(e)=>{
let x=(window.innerWidth/2 - e.clientX)/20;
let y=(window.innerHeight/2 - e.clientY)/20;
logo.style.transform=`rotateY(${x}deg) rotateX(${y}deg)`;
});

</script>

</body>
</html>
