<!DOCTYPE html>
<html lang="en">
<head>

<title>YOLO Pencils</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>

<!-- GSAP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<style>
html { scroll-behavior: smooth; }

/* PAGE TRANSITION */
body {
  opacity: 0;
  transition: 0.6s;
}
body.loaded { opacity: 1; }

/* BACKGROUND */
body {
  background: linear-gradient(135deg,#ffffff,#ddd6fe,#a78bfa);
}

/* HERO */
.hero {
  height: 90vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
}

/* BUTTON */
.btn {
  padding:12px 24px;
  border-radius:20px;
  background: linear-gradient(135deg,#6366f1,#a78bfa);
  color:white;
  transition:0.3s;
}
.btn:hover { transform: scale(1.1); }

/* PRODUCT CARDS */
.card {
  background:white;
  padding:20px;
  border-radius:20px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
  transition:0.3s;
}
.card:hover {
  transform: translateY(-10px) scale(1.03);
}
</style>

</head>

<body>

<!-- NAV -->
<nav class="flex justify-between px-10 py-4 bg-white/70 backdrop-blur-lg">
  <a href="index.html" class="flex items-center gap-2">
    <img src="yolo-logo.png" class="w-10">
    <span class="font-bold text-lg text-indigo-600">YOLO</span>
  </a>
</nav>

<!-- HERO -->
<section class="hero">

  <img src="yolo-logo.png" class="w-28 mb-6">

  <h1 class="text-5xl font-bold">Write Better.</h1>

  <p class="mt-4 text-gray-600">Premium pencils for everyday creators.</p>

  <a href="#products" class="btn mt-6">Explore</a>

</section>

<!-- PRODUCTS -->
<section id="products" class="max-w-6xl mx-auto px-6 py-16">

<h2 class="text-3xl font-bold text-center mb-10">Our Products</h2>

<div class="grid md:grid-cols-3 gap-8">

<div class="card">
  <h3 class="font-bold text-lg">YOLO Maxx</h3>
  <p class="text-gray-600">₹35</p>
  <a href="yolo-maxx.html" class="btn mt-4 inline-block">View</a>
</div>

<div class="card">
  <h3 class="font-bold text-lg">YOLO Lite</h3>
  <p class="text-gray-600">₹30</p>
  <a href="yolo-lite.html" class="btn mt-4 inline-block">View</a>
</div>

<div class="card">
  <h3 class="font-bold text-lg">Custom Pencil</h3>
  <p class="text-gray-600">₹18</p>
  <a href="custom-pencil.html" class="btn mt-4 inline-block">View</a>
</div>

</div>

</section>

<!-- CONTACT -->
<section class="text-center py-12">
  <h2 class="text-2xl font-bold">Contact</h2>
  <p class="text-gray-600 mt-2">yolo@email.com</p>
</section>

<script>

/* PAGE LOAD */
window.addEventListener("load", () => {
  document.body.classList.add("loaded");
});

/* TRANSITIONS */
document.querySelectorAll("a").forEach(link => {
  link.addEventListener("click", function(e) {
    const href = this.getAttribute("href");

    if (href && !href.startsWith("#")) {
      e.preventDefault();
      document.body.classList.remove("loaded");

      setTimeout(() => {
        window.location.href = href;
      }, 400);
    }
  });
});

/* SIMPLE ANIMATION */
gsap.from(".hero img", { scale:0.5, opacity:0, duration:1 });
gsap.from("h1", { y:50, opacity:0, duration:1 });

</script>

</body>
</html>
