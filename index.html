<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YOLO Newsletter</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0a0a0a;
  --panel:#111;
  --accent:#ff2a2a;
}

body{
  margin:0;
  font-family:Montserrat, sans-serif;
  background:var(--bg);
  color:white;
}

/* LOGIN BUTTON */
#loginBtn{
  position:fixed;
  top:15px;
  right:20px;
  background:var(--accent);
  border:none;
  padding:8px 14px;
  cursor:pointer;
  font-weight:600;
  z-index:1000;
}

/* MODAL */
#authModal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  align-items:center;
  justify-content:center;
  z-index:2000;
}

.modal{
  background:var(--panel);
  padding:25px;
  width:300px;
  border-radius:10px;
  text-align:center;
}

input{
  width:100%;
  padding:10px;
  margin:6px 0;
  background:#000;
  border:1px solid #333;
  color:white;
}

button{
  width:100%;
  margin-top:6px;
  padding:10px;
  background:var(--accent);
  border:none;
  cursor:pointer;
  color:black;
  font-weight:600;
}

.secondary{
  background:#333;
  color:white;
}

/* NEWSLETTER */
.container{
  max-width:400px;
  margin:120px auto;
  text-align:center;
}
</style>
</head>

<body>

<!-- LOGIN BUTTON -->
<button id="loginBtn" onclick="openAuth()">Login</button>

<!-- AUTH MODAL -->
<div id="authModal">
  <div class="modal">

    <h3 style="color:#ff2a2a">Account</h3>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button onclick="signup()">Sign Up</button>
    <button onclick="login()">Login</button>
    <button onclick="logout()">Logout</button>

    <p id="status"></p>

    <button class="secondary" onclick="closeAuth()">Close</button>

  </div>
</div>

<!-- NEWSLETTER -->
<div class="container">

  <h2 style="color:#ff2a2a">Join Newsletter</h2>
  <p style="opacity:0.7">Get updates, offers and product drops</p>

  <input id="newsletterEmail" type="email" placeholder="Enter your email">
  <button onclick="subscribe()">Subscribe</button>

  <p id="newsletterStatus"></p>

</div>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabaseClient = supabase.createClient(
  "https://iuvvufrfjrhcnrxdlqbt.supabase.co",
  "sb_publishable_5m1Eq0Qf8cDqqoZj4G3b_g_caSnvb0c"
);

let currentUser = null;

/* MODAL */
function openAuth(){
  document.getElementById("authModal").style.display="flex";
}
function closeAuth(){
  document.getElementById("authModal").style.display="none";
}

/* AUTH */
async function signup(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabaseClient.auth.signUp({ email, password });

  document.getElementById("status").innerText =
    error ? error.message : "Account created!";
}

async function login(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabaseClient.auth.signInWithPassword({ email, password });

  document.getElementById("status").innerText =
    error ? error.message : "Logged in!";
}

async function logout(){
  await supabaseClient.auth.signOut();
  document.getElementById("status").innerText = "Logged out";
}

/* SESSION */
supabaseClient.auth.onAuthStateChange((event, session) => {
  currentUser = session?.user || null;

  if(currentUser){
    document.getElementById("loginBtn").innerText = "Account";
    document.getElementById("status").innerText =
      "Logged in as " + currentUser.email;
  } else {
    document.getElementById("loginBtn").innerText = "Login";
  }
});

/* NEWSLETTER */
async function subscribe(){

  const email = document.getElementById("newsletterEmail").value;
  const statusBox = document.getElementById("newsletterStatus");

  if(!email || !email.includes("@")){
    statusBox.innerText = "Enter valid email";
    return;
  }

  statusBox.innerText = "Subscribing...";

  const { error } = await supabaseClient
    .from("newsletter")
    .insert([{ email }]);

  if(error){
    if(error.message.includes("duplicate")){
      statusBox.innerText = "Already subscribed!";
    }else{
      statusBox.innerText = error.message;
    }
  } else {
    statusBox.innerText = "Subscribed successfully!";
    document.getElementById("newsletterEmail").value = "";
  }
}
</script>

</body>
</html>
