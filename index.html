<!DOCTYPE html>
<html lang="en">
<head>

<title>YOLO Pencils</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:-apple-system;margin:0;background:#f5f3ff;}
nav{display:flex;justify-content:space-between;padding:15px 30px;background:white;}
button{background:#6d28d9;color:white;border:none;padding:10px 15px;border-radius:10px;}
.products{padding:50px;display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;}
.card{background:white;padding:20px;border-radius:20px;}
.cart{position:fixed;right:0;top:0;width:320px;height:100%;background:white;padding:20px;overflow:auto;}
.hidden{display:none;}
</style>

</head>

<body>

<nav>
<h2>YOLO Pencils</h2>
<button onclick="toggleCart()">Cart (<span id="count">0</span>)</button>
</nav>

<div class="products">

<div class="card">
<h3>YOLO Maxx 🔥</h3>
<p>₹199</p>
<button onclick="addToCart('YOLO Maxx',199)">Add</button>
</div>

<div class="card">
<h3>YOLO Lite ⚡</h3>
<p>₹99</p>
<button onclick="addToCart('YOLO Lite',99)">Add</button>
</div>

<div class="card">
<h3>Custom Pencil 🎨</h3>
<p>From ₹129</p>
<button onclick="location.href='custom.html'">Customize</button>
</div>

</div>

<div id="cart" class="cart hidden">
<h2>Your Cart</h2>
<div id="items"></div>
<h3>Total: ₹<span id="total">0</span></h3>
<button onclick="checkout()">Place Order</button>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function saveCart(){
localStorage.setItem("cart", JSON.stringify(cart));
}

function addToCart(name,price){
cart.push({name,price});
saveCart();
updateCart();
}

function updateCart(){
let items=document.getElementById("items");
let total=0;
items.innerHTML="";
cart.forEach(item=>{
total+=item.price;
items.innerHTML+=`<p>${item.name} - ₹${item.price}</p>`;
});
document.getElementById("total").innerText=total;
document.getElementById("count").innerText=cart.length;
}
updateCart();

function toggleCart(){
document.getElementById("cart").classList.toggle("hidden");
}

function checkout(){
window.location.href="checkout.html";
}
</script>

</body>
</html>
