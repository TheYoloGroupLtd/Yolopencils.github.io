<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YOLO Pencils</title>

<link rel="icon" href="./images/yolo-logo.png">

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  color: #111827;
  background: linear-gradient(135deg, #ffffff 0%, #ddd6fe 40%, #a78bfa 100%);
  overflow-x: hidden;
  scroll-behavior: smooth;
}

/* NAV */
nav {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  width: 85%;
  padding: 14px 30px;
  display: flex;
  justify-content: space-between;
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.85);
  border-radius: 25px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.08);
  z-index: 1000;
}

/* 🔥 LOGO (USED EVERYWHERE) */
.logo-circle {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  background: radial-gradient(circle, #6366f1, #a78bfa);
  box-shadow: 0 8px 25px rgba(99,102,241,0.4),
              inset 0 0 10px rgba(255,255,255,0.3);
}

.logo-circle img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* 🔥 BIG START LOGO */
.big-logo {
  display: flex;
  justify-content: center;
  align-items: center;
  padding-top: 120px;
}

.big-logo-circle {
  width: 180px;
  height: 180px;
  border-radius: 50%;
  overflow: hidden;
  background: radial-gradient(circle, #6366f1, #a78bfa);
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 
    0 20px 60px rgba(99,102,241,0.4),
    inset 0 0 20px rgba(255,255,255,0.3);
}

.big-logo-circle img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* HERO */
.hero {
  min-height: 80vh;
  display: flex;
  align-items: center;
  justify-content: space-around;
  padding: 40px 60px;
}

.hero-text {
  max-width: 520px;
}

.hero h1 {
  font-size: 70px;
  margin: 0;
}

.hero p {
  color: #4b5563;
  margin-top: 15px;
  font-size: 18px;
}

.hero img {
  width: 320px;
  border-radius: 20px;
}

/* FEATURES */
.features-strip {
  display: flex;
  justify-content: center;
  gap: 60px;
  padding: 50px 20px;
  text-align: center;
}

/* PRODUCTS */
.product {
  padding: 100px 20px;
  text-align: center;
}

.product-grid {
  display: flex;
  justify-content: center;
  gap: 35px;
  flex-wrap: wrap;
}

.card {
  width: 320px;
  padding: 30px;
  border-radius: 25px;
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(20px);
  box-shadow: 0 20px 50px rgba(0,0,0,0.1);
  transition: 0.4s;
}

.card:hover {
  transform: translateY(-12px) scale(1.04);
}

.card img {
  width: 200px;
}

/* BUTTON */
.btn {
  margin-top: 18px;
  padding: 12px 25px;
  background: linear-gradient(135deg, #6366f1, #a78bfa);
  color: white;
  border-radius: 25px;
  cursor: pointer;
}

/* CONTACT */
.contact {
  padding: 120px 20px;
  text-align: center;
}

.contact-content {
  max-width: 600px;
  margin: auto;
  padding: 60px;
  border-radius: 30px;
  background: rgba(255,255,255,0.75);
}

input, textarea {
  width: 100%;
  margin: 10px 0;
  padding: 14px;
  border-radius: 12px;
  border: 1px solid #e5e7eb;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 50px;
  color: #6b7280;
}

/* CART */
.cart {
  position: fixed;
  right: -320px;
  top: 0;
  width: 300px;
  height: 100%;
  background: white;
  padding: 20px;
  transition: 0.4s;
}
.cart.open { right: 0; }

</style>
</head>

<body>

<!-- 🔥 BIG LOGO AT START -->
<div class="big-logo">
  <div class="big-logo-circle">
    <img src="./images/yolo-logo.png">
  </div>
</div>

<!-- NAV -->
<nav>
  <div class="logo-circle">
    <img src="./images/yolo-logo.png">
  </div>
  <div onclick="toggleCart()">Cart (<span id="count">0</span>)</div>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="hero-text">
    <h1>YOLO Pencils</h1>
    <p>Designed for precision, comfort, and creativity.</p>
    <div class="btn" onclick="scrollToProducts()">Explore</div>
  </div>

  <!-- SAME IMAGE USED AGAIN -->
  <img src="./images/yolo-logo.png">
</section>

<!-- FEATURES -->
<section class="features-strip">
  <div><h3>Ultra Smooth</h3><p>No friction writing</p></div>
  <div><h3>Long Lasting</h3><p>Extended durability</p></div>
  <div><h3>Premium Grip</h3><p>Comfort always</p></div>
</section>

<!-- PRODUCTS -->
<section class="product" id="products">
  <h2>Our Products</h2>

  <div class="product-grid">
    <div class="card">
      <img src="./images/maxx.png">
      <h3>YOLO Maxx</h3>
      <div class="btn" onclick="add('Maxx',35)">₹35</div>
    </div>

    <div class="card">
      <img src="./images/lite.png">
      <h3>YOLO Lite</h3>
      <div class="btn" onclick="add('Lite',30)">₹30</div>
    </div>

    <div class="card">
      <img src="./images/custom.png">
      <h3>Custom Pencil</h3>
      <div class="btn" onclick="add('Custom',18)">₹18</div>
    </div>
  </div>
</section>

<!-- CONTACT -->
<section class="contact">
  <div class="contact-content">
    <h2>Contact Us</h2>
    <input placeholder="Name">
    <input placeholder="Email">
    <textarea placeholder="Message"></textarea>
    <div class="btn" onclick="alert('Sent 🚀')">Send</div>
  </div>
</section>

<!-- FOOTER -->
<footer>
  <div class="logo-circle" style="margin:auto;">
    <img src="./images/yolo-logo.png">
  </div>
  <br>YOLO Pencils © 2026
</footer>

<!-- CART -->
<div class="cart" id="cartBox">
  <h3>Your Cart</h3>
  <ul id="items"></ul>
</div>

<script>
let cart=[];

function add(name,price){
  cart.push({name,price});
  document.getElementById("count").innerText=cart.length;

  let li=document.createElement("li");
  li.innerText=name+" - ₹"+price;
  document.getElementById("items").appendChild(li);
}

function toggleCart(){
  document.getElementById("cartBox").classList.toggle("open");
}

function scrollToProducts(){
  document.getElementById("products").scrollIntoView({behavior:"smooth"});
}
</script>

</body>
</html>
