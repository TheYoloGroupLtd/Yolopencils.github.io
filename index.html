<!DOCTYPE html>
<html lang="en">
<head>

<title>YOLO Pencils</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  opacity: 0;
  transform: scale(1.02);
  filter: blur(10px);
  transition: all 0.6s ease;
}
body.loaded {
  opacity: 1;
  transform: scale(1);
  filter: blur(0);
}
</style>

</head>

<body class="bg-gradient-to-br from-white via-purple-50 to-indigo-100 text-gray-900">

<nav class="flex justify-between p-6 bg-white/70 backdrop-blur-lg">
  <a href="index.html" class="flex items-center gap-2">
    <img src="yolo-logo.png" class="w-10">
    <span class="font-bold text-xl">YOLO</span>
  </a>
</nav>

<section class="text-center py-20">
  <h1 class="text-5xl font-bold">YOLO Pencils</h1>
  <p class="mt-4">Premium writing tools</p>
</section>

<section class="max-w-6xl mx-auto grid md:grid-cols-3 gap-10 px-6">

<div class="bg-white p-6 rounded-xl shadow text-center">
  <h3 class="text-xl font-bold">YOLO Maxx</h3>
  <p>₹35</p>
  <a href="yolo-maxx.html" class="mt-4 inline-block bg-indigo-600 text-white px-4 py-2 rounded">View</a>
</div>

<div class="bg-white p-6 rounded-xl shadow text-center">
  <h3 class="text-xl font-bold">YOLO Lite</h3>
  <p>₹30</p>
  <a href="yolo-lite.html" class="mt-4 inline-block bg-indigo-600 text-white px-4 py-2 rounded">View</a>
</div>

<div class="bg-white p-6 rounded-xl shadow text-center">
  <h3 class="text-xl font-bold">Custom Pencil</h3>
  <p>₹18</p>
  <a href="custom-pencil.html" class="mt-4 inline-block bg-indigo-600 text-white px-4 py-2 rounded">View</a>
</div>

</section>

<script>
window.addEventListener("load", () => {
  document.body.classList.add("loaded");
});

document.querySelectorAll("a").forEach(link => {
  link.addEventListener("click", function(e) {
    const href = this.getAttribute("href");
    if (href && !href.startsWith("#")) {
      e.preventDefault();
      document.body.classList.remove("loaded");
      setTimeout(() => {
        window.location.href = href;
      }, 500);
    }
  });
});
</script>

</body>
</html>
