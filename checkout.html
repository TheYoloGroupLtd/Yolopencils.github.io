<!DOCTYPE html>
<html lang="en">
<head>
  <title>Simple Delete Button</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f5f5f5;
    }

    .item {
      background: white;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
    }

    button {
      background: red;
      color: white;
      border: none;
      padding: 5px 10px;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h2>🛒 Cart Items</h2>

<div class="item">
  <span>YOLO Maxx - ₹35</span>
  <button onclick="this.parentElement.remove()">Delete</button>
</div>

<div class="item">
  <span>YOLO Lite - ₹30</span>
  <button onclick="this.parentElement.remove()">Delete</button>
</div>

<div class="item">
  <span>Custom Pencil - ₹20</span>
  <button onclick="this.parentElement.remove()">Delete</button>
</div>

</body>
</html>
