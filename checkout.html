<!DOCTYPE html>
<html lang="en">
<head>
  <title>Cart with Quantity</title>
  <meta charset="UTF-8">
  <style>
    body { font-family: Arial; padding: 20px; }
    .item { margin: 10px 0; }
    button { margin: 0 5px; }
  </style>
</head>
<body>

<h2>Products</h2>
<button onclick="addItem('YOLO Maxx')">Add YOLO Maxx</button>

<h2>Cart</h2>
<div id="cart"></div>

<script>
let cart = {};

function addItem(name) {
  if (!cart[name]) {
    cart[name] = 1;
  } else {
    cart[name]++;
  }
  renderCart();
}

function increase(name) {
  cart[name]++;
  renderCart();
}

function decrease(name) {
  cart[name]--;
  if (cart[name] <= 0) {
    delete cart[name]; // removes item completely
  }
  renderCart();
}

function renderCart() {
  let html = "";

  for (let item in cart) {
    html += `
      <div class="item">
        ${item} (Qty: ${cart[item]})
        <button onclick="decrease('${item}')">-</button>
        <button onclick="increase('${item}')">+</button>
      </div>
    `;
  }

  document.getElementById("cart").innerHTML = html;
}
</script>

</body>
</html>
