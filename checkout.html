<!DOCTYPE html>
<html lang="en">
<head>
  <title>YOLO Premium Cart</title>
  <meta charset="UTF-8">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: #f7f7f7;
      margin: 0;
      padding: 20px;
    }

    h2 {
      font-weight: 600;
    }

    .product {
      background: white;
      padding: 15px;
      border-radius: 15px;
      margin: 15px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 5px 20px rgba(0,0,0,0.05);
      transition: 0.2s;
    }

    .product:hover {
      transform: translateY(-3px);
    }

    .info {
      display: flex;
      flex-direction: column;
    }

    .name {
      font-weight: 600;
    }

    .price {
      color: gray;
      font-size: 14px;
    }

    .add-btn {
      background: linear-gradient(135deg, #00c853, #00e676);
      color: white;
      border: none;
      padding: 8px 18px;
      border-radius: 20px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }

    .add-btn:hover {
      transform: scale(1.05);
    }

    .qty-box {
      display: flex;
      align-items: center;
      border-radius: 20px;
      background: #f1f1f1;
      overflow: hidden;
    }

    .qty-box button {
      border: none;
      background: transparent;
      padding: 6px 12px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
    }

    .qty-box button:hover {
      background: #ddd;
    }

    .qty {
      padding: 0 12px;
      font-weight: 600;
    }

    /* Checkout Bar */
    .checkout-bar {
      position: fixed;
      bottom: 15px;
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      max-width: 500px;
      background: black;
      color: white;
      padding: 15px 20px;
      border-radius: 50px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .checkout-btn {
      background: #00c853;
      border: none;
      color: white;
      padding: 8px 16px;
      border-radius: 20px;
      font-weight: 600;
      cursor: pointer;
    }

  </style>
</head>

<body>

<h2>YOLO Store</h2>

<div class="product" id="maxx">
  <div class="info">
    <div class="name">YOLO Maxx</div>
    <div class="price">₹35</div>
  </div>
  <div class="action"></div>
</div>

<div class="product" id="lite">
  <div class="info">
    <div class="name">YOLO Lite</div>
    <div class="price">₹30</div>
  </div>
  <div class="action"></div>
</div>

<div class="product" id="custom">
  <div class="info">
    <div class="name">Custom Pencil</div>
    <div class="price">₹20</div>
  </div>
  <div class="action"></div>
</div>

<div class="checkout-bar">
  <span>Total: ₹<span id="total">0</span></span>
  <button class="checkout-btn">Checkout</button>
</div>

<script>
let cart = {};
let prices = {
  maxx: 35,
  lite: 30,
  custom: 20
};

function render(id) {
  const el = document.querySelector(`#${id} .action`);
  const qty = cart[id] || 0;

  if (qty === 0) {
    el.innerHTML = `<button class="add-btn" onclick="add('${id}')">ADD</button>`;
  } else {
    el.innerHTML = `
      <div class="qty-box">
        <button onclick="decrease('${id}')">−</button>
        <div class="qty">${qty}</div>
        <button onclick="increase('${id}')">+</button>
      </div>
    `;
  }
}

function add(id) {
  cart[id] = 1;
  update();
}

function increase(id) {
  cart[id]++;
  update();
}

function decrease(id) {
  cart[id]--;
  if (cart[id] <= 0) delete cart[id];
  update();
}

function update() {
  let total = 0;

  for (let id in prices) {
    if (cart[id]) {
      total += cart[id] * prices[id];
    }
    render(id);
  }

  document.getElementById("total").innerText = total;
}

Object.keys(prices).forEach(render);
</script>

</body>
</html>
