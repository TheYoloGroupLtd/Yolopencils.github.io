<!DOCTYPE html>
<html lang="en">
<head>

<title>Checkout | YOLO</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
font-family:'Poppins',sans-serif;
margin:0;
background:linear-gradient(135deg,#ede9fe,#f5f3ff);
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 8%;
background:rgba(255,255,255,0.7);
backdrop-filter:blur(10px);
}

.container{
max-width:600px;
margin:50px auto;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.order-item{
display:flex;
justify-content:space-between;
align-items:center;
background:#f5f3ff;
padding:10px;
border-radius:10px;
margin-bottom:10px;
}

.remove-btn{
background:#ef4444;
color:white;
border:none;
padding:6px 10px;
border-radius:8px;
cursor:pointer;
}

input, textarea{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #ccc;
margin-top:10px;
}

button.submit{
margin-top:20px;
background:#7c3aed;
color:white;
border:none;
padding:12px;
border-radius:12px;
cursor:pointer;
width:100%;
}

.total{
font-weight:600;
margin-top:15px;
}
</style>

</head>

<body>

<nav>
<h2>YOLO ✏️</h2>
<a href="index.html">Back</a>
</nav>

<div class="container">

<h1>Checkout</h1>

<div id="cartContainer"></div>

<div class="total">
Total: ₹<span id="total">0</span>
</div>

<form action="https://formbold.com/s/6vKbe" method="POST">

<input type="hidden" name="formType" value="order">

<input name="name" placeholder="Full Name" required>
<input name="phone" placeholder="Phone Number" required>
<textarea name="address" placeholder="Full Address" required></textarea>

<button class="submit" type="submit">Place Order</button>

</form>

</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

// COLOR CONVERTER
function getColorName(hex){
const colors = {
"#ff0000":"Red",
"#00ff00":"Green",
"#0000ff":"Blue",
"#ffff00":"Yellow",
"#ffa500":"Orange",
"#800080":"Purple",
"#000000":"Black",
"#ffffff":"White",
"#808080":"Gray",
"#ffc0cb":"Pink"
};

hex = hex.toLowerCase();
return colors[hex] || hex;
}

// CREATE HIDDEN FIELD
function createHiddenField(name,value){
let input = document.createElement("input");
input.type = "hidden";
input.name = name;
input.value = value;
input.classList.add("dynamic-field");
document.querySelector("form").appendChild(input);
}

// RENDER CART
function renderCart(){

let container = document.getElementById("cartContainer");
let total = 0;

container.innerHTML = "";

// remove old fields
document.querySelectorAll(".dynamic-field").forEach(e => e.remove());

cart.forEach((item,index)=>{

total += item.price;

// extract color
let match = item.name.match(/\((.*?)\)/);
let colorHex = match ? match[1] : "";
let colorName = getColorName(colorHex);

// clean name
let cleanName = item.name.replace(/\(.*?\)/, "").trim();

// UI
container.innerHTML += `
<div class="order-item">
<span>${cleanName} (${colorName}) - ₹${item.price}</span>
<button class="remove-btn" onclick="removeItem(${index})">X</button>
</div>
`;

// FORM FIELDS
createHiddenField(`product_${index+1}`, cleanName);
createHiddenField(`color_${index+1}`, colorName);
createHiddenField(`price_${index+1}`, item.price);

});

document.getElementById("total").innerText = total;
createHiddenField("totalAmount", total);
}

// REMOVE ITEM
function removeItem(index){
cart.splice(index,1);
localStorage.setItem("cart", JSON.stringify(cart));
renderCart();
}

// INIT
renderCart();

</script>

</body>
</html>
