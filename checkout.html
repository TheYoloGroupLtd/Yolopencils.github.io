<!DOCTYPE html>
<html>
<head>
<title>Checkout</title>

<style>
body{
font-family:Arial;
background:#f5f3ff;
}

.container{
max-width:600px;
margin:auto;
background:white;
padding:20px;
border-radius:15px;
}

.item{
display:flex;
justify-content:space-between;
background:#eee;
padding:10px;
margin:5px 0;
}

button{
cursor:pointer;
}
</style>

</head>

<body>

<div class="container">

<h2>Checkout</h2>

<div id="cart"></div>
<h3>Total: ₹<span id="total">0</span></h3>

<form id="form" action="https://formbold.com/s/6vKbe" method="POST">

<input type="hidden" name="order_summary" id="summary">

<input name="name" placeholder="Name" required><br><br>
<input name="phone" placeholder="Phone" required><br><br>
<textarea name="address" placeholder="Address" required></textarea><br><br>

<button type="submit">Place Order</button>

</form>

</div>

<script>

// ALWAYS START CLEAN IF DATA IS BROKEN
// (run once manually if needed)
// localStorage.clear();

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let total = 0;

// RENDER CART
function render(){

document.getElementById("cart").innerHTML = "";
total = 0;

if(cart.length === 0){
document.getElementById("cart").innerHTML = "Cart is empty";
document.getElementById("total").innerText = 0;
return;
}

cart.forEach((item,i)=>{

total += item.price;

document.getElementById("cart").innerHTML += `
<div class="item">
<div>
${item.name} (${item.color}) - ₹${item.price}
</div>
<button onclick="removeItem(${i})">X</button>
</div>
`;

});

document.getElementById("total").innerText = total;

}

// DELETE ITEM
function removeItem(i){
cart.splice(i,1);
localStorage.setItem("cart", JSON.stringify(cart));
render();
}

// SUBMIT FORM (CRITICAL FIX)
document.getElementById("form").addEventListener("submit", function(){

let finalSummary = "";

cart.forEach((item,i)=>{
finalSummary += item.name + " (" + item.color + ") - ₹" + item.price + "\n";
});

finalSummary += "\nTotal: ₹" + total;

// SEND TO FORMBOLD
document.getElementById("summary").value = finalSummary;

// CLEAR CART AFTER ORDER
localStorage.removeItem("cart");

});

// INITIAL LOAD
render();

</script>

</body>
</html>
