<!DOCTYPE html>
<html lang="en">
<head>

<title>Checkout | YOLO</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{font-family:'Poppins';margin:0;background:linear-gradient(135deg,#ede9fe,#f5f3ff);}
nav{display:flex;justify-content:space-between;padding:20px 8%;background:rgba(255,255,255,0.7);}
.container{max-width:650px;margin:50px auto;background:white;padding:30px;border-radius:20px;}
.order-item{display:flex;justify-content:space-between;align-items:center;background:#f5f3ff;padding:10px;border-radius:10px;margin-bottom:10px;}
.remove-btn{background:#ef4444;color:white;border:none;padding:6px 10px;border-radius:8px;cursor:pointer;}
input,textarea{width:100%;padding:12px;margin-top:10px;border-radius:10px;border:1px solid #ccc;}
button.submit{margin-top:20px;background:#7c3aed;color:white;border:none;padding:12px;border-radius:12px;width:100%;}
.total{font-weight:600;margin-top:10px;}
</style>

</head>

<body>

<nav>
<h2>YOLO ✏️</h2>
<a href="index.html">Back</a>
</nav>

<div class="container">

<h1>Checkout</h1>

<div id="cartContainer"></div>
<div class="total">Total: ₹<span id="total">0</span></div>

<form id="orderForm" action="https://formbold.com/s/6vKbe" method="POST">

<input type="hidden" name="formType" value="order">

<!-- PRO DASHBOARD FIELD -->
<input type="hidden" name="order_summary" id="orderSummary">

<!-- EXTRA META -->
<input type="hidden" name="order_id" id="orderId">
<input type="hidden" name="order_time" id="orderTime">
<input type="hidden" name="totalAmount" id="totalField">

<input name="name" placeholder="Full Name" required>
<input name="phone" placeholder="Phone Number" required>
<textarea name="address" placeholder="Address" required></textarea>

<button class="submit" id="submitBtn">Place Order</button>

</form>

</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

// COLOR MAP
function getColorName(hex){
const map={
"#ff0000":"Red","#00ff00":"Green","#0000ff":"Blue",
"#ffff00":"Yellow","#ffa500":"Orange","#800080":"Purple",
"#000000":"Black","#ffffff":"White","#808080":"Gray","#ffc0cb":"Pink"
};
return map[hex?.toLowerCase()] || hex;
}

// CREATE FIELD
function createField(name,value){
let input=document.createElement("input");
input.type="hidden";
input.name=name;
input.value=value;
input.classList.add("dyn");
document.getElementById("orderForm").appendChild(input);
}

// RENDER CART
function render(){

let container=document.getElementById("cartContainer");
let total=0;
let summary="";

container.innerHTML="";
document.querySelectorAll(".dyn").forEach(e=>e.remove());

if(cart.length===0){
container.innerHTML="<p>Cart is empty</p>";
document.getElementById("submitBtn").disabled=true;
return;
}

cart.forEach((item,i)=>{

let colorName=getColorName(item.color || "");

total+=item.price;

// UI
container.innerHTML+=`
<div class="order-item">
<span>${item.name} (${colorName}) - ₹${item.price}</span>
<button class="remove-btn" onclick="removeItem(${i})">X</button>
</div>
`;

// SUMMARY (MAIN DASHBOARD VIEW)
summary += `Item ${i+1}\n`;
summary += `Product: ${item.name}\n`;
summary += `Color: ${colorName}\n`;
summary += `Price: ₹${item.price}\n\n`;

// STRUCTURED FIELDS (BACKGROUND USE)
createField(`product_${i+1}`,item.name);
createField(`color_${i+1}`,colorName);
createField(`price_${i+1}`,item.price);

});

// FINAL SUMMARY
summary += `Total: ₹${total}`;

// SET VALUES
document.getElementById("total").innerText=total;
document.getElementById("orderSummary").value=summary;
document.getElementById("totalField").value=total;

// ORDER META
let orderId="YOLO-"+Math.floor(Math.random()*1000000);
document.getElementById("orderId").value=orderId;

let time=new Date().toLocaleString();
document.getElementById("orderTime").value=time;

}

// REMOVE ITEM
function removeItem(i){
cart.splice(i,1);
localStorage.setItem("cart",JSON.stringify(cart));
render();
}

// CLEAR CART AFTER ORDER
document.getElementById("orderForm").addEventListener("submit",()=>{
localStorage.removeItem("cart");
});

render();

</script>

</body>
</html>
