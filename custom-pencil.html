<!DOCTYPE html>
<html lang="en">
<head>
<title>Custom Pencil</title>
<meta charset="UTF-8">
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  opacity: 0;
  transform: scale(1.02);
  filter: blur(10px);
  transition: all 0.6s ease;
}
body.loaded {
  opacity: 1;
  transform: scale(1);
  filter: blur(0);
}
</style>
</head>

<body class="text-center p-10">

<a href="index.html">
<img src="yolo-logo.png" class="w-12 mx-auto mb-6">
</a>

<h1 class="text-4xl font-bold">Custom Pencil</h1>
<p class="mt-4">Handcrafted premium design</p>
<p class="mt-2 text-xl">₹18</p>

<div class="mt-10">
  <h3 class="text-xl mb-4">Explore More</h3>
  <a href="yolo-maxx.html">YOLO Maxx</a> |
  <a href="yolo-lite.html">YOLO Lite</a>
</div>

<script>
window.addEventListener("load", () => {
  document.body.classList.add("loaded");
});

document.querySelectorAll("a").forEach(link => {
  link.addEventListener("click", function(e) {
    const href = this.getAttribute("href");
    if (href && !href.startsWith("#")) {
      e.preventDefault();
      document.body.classList.remove("loaded");
      setTimeout(() => {
        window.location.href = href;
      }, 500);
    }
  });
});
</script>

</body>
</html>
