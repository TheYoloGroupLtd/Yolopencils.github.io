<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YOLO Maxx</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system;}
body{
background:linear-gradient(135deg,#ffffff,#f5f3ff,#ede9fe);
color:#111;
overflow-x:hidden;
}
section{padding:120px 8%;}

.hero{
display:flex;
justify-content:space-between;
align-items:center;
height:100vh;
}

h1{
font-size:70px;
background:linear-gradient(135deg,#6d28d9,#a78bfa);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.product{
width:350px;
height:350px;
border-radius:50%;
background:rgba(255,255,255,0.7);
backdrop-filter:blur(20px);
display:flex;
align-items:center;
justify-content:center;
transition:0.2s;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
}

.card{
padding:40px;
border-radius:25px;
background:rgba(255,255,255,0.6);
backdrop-filter:blur(20px);
}

.buy{
text-align:center;
}

button{
padding:14px 30px;
border:none;
border-radius:25px;
background:#6d28d9;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<section class="hero">

<div>
<h1>YOLO Maxx</h1>
<p>Ultimate writing experience.</p>
</div>

<div class="product" id="p">
<img src="yolo-logo.png" width="150">
</div>

</section>

<section>
<div class="grid">
<div class="card">⚡ Ultra Smooth</div>
<div class="card">💎 Premium Metal Body</div>
<div class="card">🚀 High Speed Writing</div>
</div>
</section>

<section class="buy">
<h2>Order Now</h2>
<p>Send order to: yologroupltd@outlook.com</p>
<button onclick="order()">Place Order</button>
</section>

<script>
const p=document.getElementById("p");
document.addEventListener("mousemove",e=>{
let x=(e.clientX/window.innerWidth-0.5)*20;
let y=(e.clientY/window.innerHeight-0.5)*20;
p.style.transform=`rotateY(${x}deg) rotateX(${-y}deg)`;
});

function order(){
alert("Send your order via email 🚀");
}
</script>

</body>
</html>
