<!DOCTYPE html>
<html>
<head>
<title>YOLO Maxx</title>
</head>
<body>

<h1>YOLO Maxx 🔥 (₹35)</h1>

<!-- BODY COLOR -->
<p>Body Color:</p>
<input type="color" id="bodyColor" value="#ffff00">

<br><br>

<!-- TEXT COLOR -->
<p>Text Color:</p>
<input type="color" id="textColor" value="#000000">

<br><br>

<button onclick="addToCart()">Add to Cart</button>

<script>

function addToCart(){

let bodyColor = document.getElementById("bodyColor").value;
let textColor = document.getElementById("textColor").value;

let cart = JSON.parse(localStorage.getItem("cart")) || [];

cart.push({
name: "YOLO Maxx",
price: 35,
bodyColor: bodyColor,
textColor: textColor
});

localStorage.setItem("cart", JSON.stringify(cart));

alert("Added!");
}

</script>

</body>
</html>
